<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}
.container{
    background:white;
    width:300px;
    margin:100px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:70%;
    padding:8px;
}

button{
    padding:8px 12px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

li{
    list-style:none;
    margin:10px 0;
    display:flex;
    justify-content:space-between;
}
.delete{
    background:red;
}
</style>
</head>
<body>
<div class="container">
<h2>My To-Do List</h2>
<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>
<ul id="taskList"></ul>
</div>
<script>
function addTask(){
    let input = document.getElementById("taskInput");
    let task = input.value;
    if(task === "") return;
    let li = document.createElement("li");
    li.innerHTML = task + 
    ' <button class="delete" onclick="this.parentElement.remove()">X</button>';
    document.getElementById("taskList").appendChild(li);
    input.value="";
}
</script>
</body>
</html>
